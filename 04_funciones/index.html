<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <title>funciones</title>
</head>

<body>
    <main class="contenedor p-2 d-flex gap-3 flex-wrap">
        <!-- ejercicio 1 -->
        <div class="card" style="width: 18rem;">
            <img class="card-img-top">
            <div class="card-body">
                <h5 class="card-title"> Ejercicio 1:</h5>
                <input type="text" class="form-control mb-3" id="input1" placeholder="Ingresar un nombre">
                <p class="card-text">Lista de asistencia(push).</p>
                <a href="#" class="btn btn-primary" onclick="registrarAlumno()">Ejecutar</a>
                <div id="container1" class="mt-4 d-none">
                    <h5>Resultado:</h5>
                    <div id="result1" class="alert alert-success fw-bold"></div>
                </div>
            </div>
        </div>
        <!-- ejercicio 2 -->
        <div class="card" style="width: 18rem;">
            <img class="card-img-top">
            <div class="card-body">
                <h5 class="card-title"> Ejercicio 2:</h5>
                <input type="text" class="form-control mb-3" id="input2" placeholder="Ingresar un nombre">
                <p class="card-text">Fila de urgencias medicas.</p>
                <a href="#" class="btn btn-primary" onclick="ingresarUrgencia()">Ejecutar</a>
                <div id="container2" class="mt-4 d-none">
                    <h5>Resultado:</h5>
                    <div id="result2" class="alert alert-success fw-bold"></div>
                </div>
            </div>
        </div>
        <!-- ejercicio 3 -->
        <div class="card" style="width: 18rem;">
            <img class="card-img-top">
            <div class="card-body">
                <h5 class="card-title"> Ejercicio 3:</h5>
                <input type="text" class="form-control mb-3" id="input3" placeholder="despache/cancele el pedido ">
                <p class="card-text">Sistema de delivery.</p>
                <a href="#" class="btn btn-primary" onclick="gestionarPedido()">Ejecutar</a>
                <div id="container3" class="mt-4 d-none">
                    <h5>Resultado:</h5>
                    <div id="result3" class="alert alert-success fw-bold"></div>
                </div>
            </div>
        </div>
        <!-- ejercicio 4 -->
        <div class="card" style="width: 18rem;">
            <img class="card-img-top">
            <div class="card-body">
                <h5 class="card-title"> Ejercicio 4:</h5>
                <input type="text" class="form-control mb-3" id="input4" placeholder="despache/cancele el pedido ">
                <p class="card-text">El filtro de inventario.</p>
                <a href="#" class="btn btn-primary" onclick="validarDescuento()">Ejecutar</a>

                    <h5>Resultado:</h5>
                    <div id="result4" class="alert alert-success fw-bold"></div>
                </div>
            </div>
        </div>

    <script src="static/js/script.js"></script>

</html>
